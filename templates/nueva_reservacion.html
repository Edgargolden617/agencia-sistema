<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nueva Reservación</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<h2>Nueva Reservación</h2>

<div style="text-align: center; margin-top: 20px;">
  <a href="{{ url_for('menu') }}" id="btn_volver_menu" class="btn btn-secondary">Volver al Menú</a>
</div>

<form id="formulario" method="POST">

  <!-- ============ TIPO DE RESERVACIÓN ============ -->
  <fieldset>
    <legend>Tipo de Reservación</legend>
    <div class="form-row-doble">
      <div>
        <label>Tipo de reservación</label>
        <select name="tipo_reservacion" onchange="mostrarTipo(this.value)" required>
          <option value="" disabled selected>Selecciona una opción</option>
          <option value="hotel">Hotel</option>
          <option value="avion">Avión</option>
          <option value="otro">Otro</option>
        </select>
      </div>
    </div>
  </fieldset>


  <!-- ============ DATOS DEL CLIENTE ============ -->
  <fieldset>
    <legend>Datos del Cliente</legend>

<div class="form-row-custom">
  <div class="form-group-custom">
    <label>Nombre</label>
    <input type="text" name="nombre">
  </div>
  <div class="form-group-custom">
    <label>Apellidos</label>
    <input type="text" name="apellidos">
  </div>
  <div class="form-group-custom">
    <label>Celular</label>
    <input type="text" name="celular">
  </div>
</div>

<div class="form-row-custom">
  <div class="form-group-custom">
    <label>Email</label>
    <input type="email" name="email">
  </div>
  <div class="form-group-custom">
    <label>Referencia</label>
    <input type="text" name="referencia">
  </div>
</div>
  </fieldset>



  <fieldset id="bloque_hotel" style="display:none;">
  <legend>Reservación de Hotel</legend>

  <div class="form-row-doble">
    <div>
      <label>Hotel</label>
      <input type="text" name="hotel" data-requiered="true">
    </div>
    <div>
      <label>Ciudad</label>
      <input type="text" name="ciudad" data-requiered="true">
    </div>
  </div>

  <div class="form-row-doble">
    <div>
      <label for="fecha_entrada_mostrar">Fecha Entrada</label>
      <input type="text" id="fecha_entrada_mostrar" placeholder="Selecciona una fecha" readonly required>
      <input type="hidden" name="fecha_entrada" id="fecha_entrada_real">
      <input type="date" id="selector_fecha_entrada" style="display: none;">
    </div>

    <div>
      <label for="fecha_salida_mostrar">Fecha Salida</label>
      <input type="text" id="fecha_salida_mostrar" placeholder="Selecciona una fecha" readonly required>
      <input type="hidden" name="fecha_salida" id="fecha_salida_real">
      <input type="date" id="selector_fecha_salida" style="display: none;">
    </div>
  </div>

  <div class="form-row-doble">
    <div>
      <label>Número de Habitaciones</label>
      <select name="habitaciones" onchange="generarHabitaciones(this.value)" data-requiere="hotel">
        <option value="">Seleccione</option>
        {% for i in range(1, 10) %}
          <option value="{{ i }}">{{ i }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label>Plan</label>
      <select name="plan">
        <option value="">Seleccione</option>
        <option value="Solo Hospedaje">Solo Hospedaje</option>
        <option value="Alimentos B">Alimentos B</option>
        <option value="Desayuno Americano">Desayuno Americano</option>
        <option value="Desayuno Buffet">Desayuno Buffet</option>
        <option value="Alimentos y Bebidas">Alimentos y Bebidas</option>
        <option value="Todo Incluido">Todo Incluido</option>
      </select>
    </div>
  </div>

  <div id="contenedor_habitaciones"></div>

  <div class="form-row-doble">
    <div>
      <label for="tiempo_limite_hotel_mostrar">Tiempo Límite</label>
      <input type="text" id="tiempo_limite_hotel_mostrar" placeholder="Selecciona fecha y hora" readonly data-requiere="true">
      <input type="hidden" name="tiempo_limite" id="tiempo_limite_hotel_real">
      <input type="datetime-local" id="selector_tiempo_limite_hotel" style="display:none;">
    </div>

    <div>
      <label>Clave Proveedor</label>
      <input type="text" name="clave_proveedor" data-requiered="true">
    </div>
  </div>

  <div class="form-row-doble">
    <div>
      <label>Clave Hotel</label>
      <input type="text" name="clave_hotel">
    </div>
  </div>

  <div class="form-row">
    <label>Observaciones</label>
    <textarea name="observaciones"></textarea>
  </div>

</fieldset>

  <!-- ============ BLOQUE AVIÓN ============ -->
  <!-- ============ BLOQUE AVIÓN ============ -->

<fieldset id="bloque_avion" style="display:none;">
  <legend>Reservación de Avión</legend>

  <div class="form-row-doble">
    <div>
      <label>Aerolínea</label>
      <input type="text" name="aerolinea" data-requiere="true">
    </div>
    <div>
      <label>Vuelo</label>
      <input type="text" name="vuelo">
    </div>
  </div>

  <div class="form-row-doble">
    <div>
      <label>Origen</label>
      <input type="text" name="origen" list="ciudades" data-requiere="true">
    </div>
    <div>
      <label>Destino</label>
      <input type="text" name="destino" list="ciudades" data-requiere="true">
    </div>
  </div>



  <div class="form-row">
    <label>Número de Pasajeros</label>
    <select name="no_pasajeros" id="no_pasajeros" onchange="generarPasajeros(this.value)">
      <option value="">Seleccione</option>
      {% for i in range(1, 10) %}
        <option value="{{ i }}">{{ i }} pasajero{% if i > 1 %}s{% endif %}</option>
      {% endfor %}
    </select>
  </div>

 <!-- ESTE DIV ESTARÁ OCULTO HASTA QUE SE SELECCIONE UN PASAJERO -->
  <div id="checkbox_uso_cliente" class="form-row" style="display: none;">
  <label><input type="checkbox" id="usar_nombre_cliente"> Usar nombre del cliente para pasajero 1</label>
  </div>

  <div id="checkbox_copiar" class="form-row"></div>
  <div id="contenedor_pasajeros"></div>

  <div class="form-row">
    <label><input type="radio" name="tipo_vuelo" value="sencillo" checked onchange="toggleRedondo()"> Sencillo</label>
    <label><input type="radio" name="tipo_vuelo" value="redondo" onchange="toggleRedondo()"> Redondo</label>
  </div>

  <div class="form-row-triple">
    <div>
      <label>Fecha Salida</label>
      <input type="text" id="fecha_salida_avion_mostrar" placeholder="Selecciona una fecha" readonly data-requiered="true">
      <input type="hidden" name="fecha_salida_avion" id="fecha_salida_avion_real">
      <input type="date" id="selector_fecha_salida_avion" style="display:none;">
    </div>
    <div>
      <label>Hora Salida</label>
      <input type="text" name="hora_salida" placeholder="HH:MM" pattern="^([01]?[0-9]|2[0-3]):[0-5][0-9]$">
    </div>
    <div>
      <label>Hora Llegada</label>
      <input type="text" name="hora_llegada" placeholder="HH:MM" pattern="^([01]?[0-9]|2[0-3]):[0-5][0-9]$">
    </div>
  </div>

  <div id="fecha_regreso_bloque" style="display:none;">
    <div class="form-row-triple">
      <div>
        <label>Fecha Regreso</label>
        <input type="text" id="fecha_regreso_mostrar" placeholder="Selecciona una fecha" readonly>
        <input type="hidden" name="fecha_regreso" id="fecha_regreso_real">
        <input type="date" id="selector_fecha_regreso" style="display:none;">
      </div>
      <div>
        <label>Hora Salida Regreso</label>
        <input type="text" name="hora_regreso" placeholder="HH:MM" pattern="^([01]?[0-9]|2[0-3]):[0-5][0-9]$">
      </div>
      <div>
        <label>Hora Llegada Regreso</label>
        <input type="text" name="hora_llegada_regreso" placeholder="HH:MM" pattern="^([01]?[0-9]|2[0-3]):[0-5][0-9]$">
      </div>
    </div>
  </div>

  <div class="form-row">
    <label><input type="checkbox" id="agregar_escala" onchange="toggleEscala()"> Agregar Escala</label>
  </div>

  <div id="bloque_escala" style="display:none;">
    <div class="form-row-triple">
      <div>
        <label>Ciudad Escala</label>
        <input type="text" name="ciudad_escala">
      </div>
      <div>
        <label>Hora Salida</label>
        <input type="text" name="hora_salida_escala" placeholder="HH:MM">
      </div>
      <div>
        <label>Hora Llegada</label>
        <input type="text" name="hora_llegada_escala" placeholder="HH:MM">
      </div>
    </div>
    <div class="form-row">
      <label>Destino Escala</label>
      <input type="text" name="destino_escala">
    </div>
  </div>

  <div class="form-row">
    <label>Tiempo Límite</label>
    <input type="text" id="tiempo_limite_avion_mostrar" placeholder="Selecciona fecha y hora" readonly>
    <input type="hidden" name="tiempo_limite_avion" id="tiempo_limite_avion_real">
    <input type="datetime-local" id="selector_tiempo_limite_avion" style="display:none;">
  </div>

  <div class="form-row-doble">
    <div>
      <label>Clave Proveedor</label>
      <input type="text" name="clave_proveedor_avion">
    </div>
    <div>
      <label>Clave Aerolínea</label>
      <input type="text" name="clave_aerolinea">
    </div>
  </div>

  <div class="form-row">
    <label>Observaciones</label>
    <textarea name="observaciones_avion"></textarea>
  </div>

  <datalist id="ciudades">
    <option value="Cancún">
    <option value="Ciudad de México">
    <option value="Guadalajara">
    <option value="Monterrey">
  </datalist>
</fieldset>

  <!-- ============ DATOS ADMINISTRATIVOS ============ -->
  <fieldset>
    <legend>Datos Administrativos</legend>

<div class="form-row-custom">
  <div class="form-group-custom">
    <label>Proveedor</label>
    <input type="text" name="proveedor" required>
  </div>
  <div class="form-group-custom">
    <label>Costo Cliente</label>
    <input type="text" name="costo_cliente" onblur="formatearMoneda(this)">
  </div>
  <div class="form-group-custom">
    <label>Costo Proveedor</label>
    <input type="text" name="costo_proveedor" onblur="formatearMoneda(this)">
  </div>
</div>

<div class="form-row-custom">
  <div class="form-group-custom" style="flex: 1;">
    <label>Observaciones de Pago</label>
    <textarea name="observaciones_pago" rows="3" style="width: 100%;"></textarea>
  </div>
</div>
  </fieldset>

  <button type="submit">Guardar Reservación</button>

  <button type="button" onclick="confirmarSalida()" style="
  background: linear-gradient(to right, #d4af37, #f0c14b);
  border: none;
  color: #fff;
  padding: 12px 24px;
  font-size: 16px;
  border-radius: 6px;
  font-weight: bold;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  cursor: pointer;
">
  ⬅️ Regresar al Menú
</button>
</form>



<script>
document.querySelector("form").addEventListener("submit", function(event) {
  const tipo = document.querySelector('select[name="tipo_reservacion"]').value;

  // ===============================
  // 1️⃣ LIMPIAR REQUIRED ANTERIORES
  // ===============================
  document
    .querySelectorAll("[data-required]")
    .forEach(el => el.removeAttribute("required"));

  // ===============================
  // 2️⃣ ACTIVAR REQUIRED SOLO AL BLOQUE ACTIVO
  // ===============================
  if (tipo === "hotel") {
    document
      .querySelectorAll("#bloque_hotel [data-required]")
      .forEach(el => el.setAttribute("required", "true"));
  }

  if (tipo === "avion") {
    document
      .querySelectorAll("#bloque_avion [data-required]")
      .forEach(el => el.setAttribute("required", "true"));
  }

  // ===============================
  // 3️⃣ VALIDACIONES PERSONALIZADAS
  // ===============================

  // Fechas hotel
  if (tipo === "hotel") {
    const entrada = document.querySelector('input[name="fecha_entrada"]');
    const salida = document.querySelector('input[name="fecha_salida"]');
    if (entrada.value && salida.value && entrada.value > salida.value) {
      alert("⚠️ La fecha de entrada no puede ser después de la salida.");
      event.preventDefault();
      return;
    }
  }

  /// ✅ VALIDACIÓN: número de habitaciones SOLO para HOTEL
if (tipo === "hotel") {
  const habitaciones = document.querySelector('select[name="habitaciones"]');
  if (!habitaciones.value) {
    alert("⚠️ Debes seleccionar el número de habitaciones.");
    habitaciones.focus();
    event.preventDefault();
    return;
  }
}
    

  // Costos
  const costoCliente = parseFloat(document.querySelector('input[name="costo_cliente"]').value);
  const costoProveedor = parseFloat(document.querySelector('input[name="costo_proveedor"]').value);
  if (!isNaN(costoCliente) && !isNaN(costoProveedor) && costoCliente < costoProveedor) {
    alert("⚠️ El costo al cliente no puede ser menor al costo del proveedor.");
    event.preventDefault();
    return;
  }

  // Pasajeros avión
  if (tipo === "avion") {
    const noPasajeros = document.getElementById("no_pasajeros");
    if (!noPasajeros.value) {
      alert("⚠️ Debes seleccionar el número de pasajeros.");
      noPasajeros.focus();
      event.preventDefault();
      return;
    }
  }
});
</script>

<!-- SCRIPT: Confirmar salida -->
<script>
function confirmarSalida() {
  const confirmar = confirm("¿Deseas salir de la reservación sin guardar?\nSe perderán los datos ingresados.");
  if (confirmar) {
    window.location.href = "{{ url_for('menu') }}";  // Asegúrate de que esta ruta existe en Flask
  }
}
</script>




<!-- ============ JS ============ -->
<script src="{{ url_for('static', filename='js/reservacion.js') }}" defer></script>



</body>
</html>
